name: Deploy to Hostinger (production)

# Auto-deploys www.thefairytails.co.uk on every push to main.
# Secrets required (repo Settings → Secrets and variables → Actions):
#   FTP_SERVER    — from hPanel → Files → FTP Accounts (host or IP)
#   FTP_USERNAME  — dedicated FTP account whose directory IS the site docroot
#                   (domains/thefairytails.co.uk/public_html)
#   FTP_PASSWORD  — that FTP account's password
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hostinger-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        run: npm run build

      - name: Verify built URLs
        run: node scripts/verify-urls.mjs --dist

      - name: Deploy dist/ to Hostinger via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: dist/
          server-dir: ./
